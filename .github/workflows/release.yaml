name: Release
on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  set-version:
    runs-on: ubuntu-latest
    name: set-version
    permissions:
      contents: read
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false
      - name: set version
        id: set-version
        run: |
          echo Faking a Semantic Version
          echo "version=1.$(date "+%Y%m%d%H%M%S")" >> ${GITHUB_OUTPUT}

  release:
    name: perform release
    runs-on: ubuntu-latest
    needs:
      - set-version
    permissions:
      contents: "write" # for creating releases
      id-token: "write" # for creating releases
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false
      - name: Perform release
        run: |
          curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -H "X-GitHub-Api-Version: 2026-03-10" \
          https://api.github.com/repos/${GITHUB_REPOSITORY}/releases \
          -d "{\"tag_name\":\"v${VERSION}\",\"target_commitish\":\"main\",\"name\":\"v${VERSION}\",\"body\":\"Version ${VERSION}\",\"draft\":false,\"prerelease\":false,\"generate_release_notes\":false}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.set-version.outputs.version }}